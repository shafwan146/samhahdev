services:
  postgres:
    image: postgres:15-alpine
    container_name: samhah_postgres
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: samhah_farm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: samhah123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d samhah_farm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
